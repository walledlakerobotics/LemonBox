<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <title>Lemon Workstation</title>
</head>
<body>
    
    <h1 id="warning"></h1>
    <div id="motor-grid"></div>

    <div id="motor-menu">

        <img id="motor-img">

        <div id="properties">
            <h1 id="motor-name"></h1>
            <h2 id="motor-id"></h2>

            <input type="range" min="-100" max="100" value="0" id="speed-slider" title="speed">
            <button title="apply" id="apply-button">Apply</button>
            <button title="back" id="back-button">Back</button>
        </div>

    </div>

    <script src="index.js"></script>
</body>
</html>
